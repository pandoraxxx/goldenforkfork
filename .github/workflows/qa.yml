name: QA Gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '30 1 * * 1-5'

jobs:
  gate:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: API gate tests
        run: npm run test:api

      - name: E2E gate tests
        run: npm run test:e2e

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-gate-reports
          path: |
            test-results
          if-no-files-found: warn

  live-smoke:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Start API
        run: |
          nohup npm run api > /tmp/api.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:4000/api/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start"; cat /tmp/api.log; exit 1

      - name: Run live smoke
        run: npm run test:live > test-results/live-smoke.json

      - name: Upload live smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-smoke-report
          path: |
            test-results/live-smoke.json
            /tmp/api.log
          if-no-files-found: warn
